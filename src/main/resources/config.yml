integrations:
  vault: true
  placeholderapi: true
  mythicmobs: true
  worldguard: true
quest-resets:
  timezone: Asia/Manila
  daily-reset-time: '00:00'
  weekly-reset-day: MONDAY
  weekly-reset-time: '00:00'
